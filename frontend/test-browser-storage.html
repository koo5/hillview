<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Browser Photo Storage</title>
    <style>
        body {
            font-family: system-ui;
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            font-size: 16px;
        }
        #status {
            margin: 20px 0;
            padding: 10px;
            background: #f0f0f0;
            border-radius: 5px;
        }
        #photos {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 10px;
            margin-top: 20px;
        }
        .photo {
            border: 1px solid #ccc;
            padding: 10px;
            border-radius: 5px;
        }
        .photo img {
            width: 100%;
            height: auto;
        }
    </style>
</head>
<body>
    <h1>Browser Photo Storage Test</h1>

    <div>
        <button onclick="testStorage()">Test IndexedDB Storage</button>
        <button onclick="createTestPhoto()">Create Test Photo</button>
        <button onclick="listPhotos()">List Stored Photos</button>
        <button onclick="clearPhotos()">Clear All Photos</button>
    </div>

    <div id="status"></div>
    <div id="photos"></div>

    <script type="module">
        // Simple test without the full app infrastructure
        const DB_NAME = 'HillviewPhotoDB';
        const DB_VERSION = 2;

        function log(msg) {
            const status = document.getElementById('status');
            status.innerHTML += msg + '<br>';
            console.log(msg);
        }

        async function openDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);

                request.onerror = () => reject(request.error);
                request.onsuccess = () => resolve(request.result);

                request.onupgradeneeded = (event) => {
                    const db = event.target.result;

                    if (!db.objectStoreNames.contains('photos')) {
                        const store = db.createObjectStore('photos', { keyPath: 'id' });
                        store.createIndex('uploaded', 'uploaded');
                        store.createIndex('captured_at', 'captured_at');
                        store.createIndex('created_at', 'created_at');
                    }

                    if (!db.objectStoreNames.contains('auth')) {
                        db.createObjectStore('auth');
                    }

                    if (!db.objectStoreNames.contains('config')) {
                        db.createObjectStore('config');
                    }
                };
            });
        }

        window.testStorage = async function() {
            log('Testing IndexedDB...');
            try {
                const db = await openDB();
                log('✅ Database opened successfully');
                log('Object stores: ' + Array.from(db.objectStoreNames).join(', '));

                // Check storage estimate
                if (navigator.storage && navigator.storage.estimate) {
                    const estimate = await navigator.storage.estimate();
                    const usedMB = (estimate.usage / 1024 / 1024).toFixed(2);
                    const quotaMB = (estimate.quota / 1024 / 1024).toFixed(2);
                    log(`Storage: ${usedMB} MB used of ${quotaMB} MB`);
                }
            } catch (error) {
                log('❌ Error: ' + error);
            }
        }

        window.createTestPhoto = async function() {
            log('Creating test photo...');
            try {
                // Create a simple canvas image
                const canvas = document.createElement('canvas');
                canvas.width = 100;
                canvas.height = 100;
                const ctx = canvas.getContext('2d');

                // Draw something
                ctx.fillStyle = `hsl(${Math.random() * 360}, 70%, 50%)`;
                ctx.fillRect(0, 0, 100, 100);
                ctx.fillStyle = 'white';
                ctx.font = '20px Arial';
                ctx.fillText(new Date().getSeconds(), 30, 60);

                // Convert to blob
                const blob = await new Promise(resolve => {
                    canvas.toBlob(resolve, 'image/jpeg', 0.9);
                });

                // Create photo record
                const photo = {
                    id: 'test_' + Date.now(),
                    blob: blob,
                    location: {
                        latitude: 37.7749 + Math.random() * 0.01,
                        longitude: -122.4194 + Math.random() * 0.01,
                        accuracy: 10,
                        heading: Math.random() * 360,
                        location_source: 'gps',
                        bearing_source: 'compass'
                    },
                    captured_at: Date.now(),
                    orientation_code: 1,
                    mode: 'fast',
                    uploaded: false,
                    upload_attempts: 0,
                    created_at: Date.now()
                };

                // Save to DB
                const db = await openDB();
                const transaction = db.transaction(['photos'], 'readwrite');
                const store = transaction.objectStore('photos');
                await new Promise((resolve, reject) => {
                    const request = store.put(photo);
                    request.onsuccess = resolve;
                    request.onerror = () => reject(request.error);
                });

                log(`✅ Photo saved: ${photo.id}`);
                log(`   Location: ${photo.location.latitude.toFixed(4)}, ${photo.location.longitude.toFixed(4)}`);
                log(`   Heading: ${photo.location.heading.toFixed(0)}°`);

                await listPhotos();
            } catch (error) {
                log('❌ Error: ' + error);
            }
        }

        window.listPhotos = async function() {
            try {
                const db = await openDB();
                const transaction = db.transaction(['photos'], 'readonly');
                const store = transaction.objectStore('photos');

                const photos = await new Promise((resolve, reject) => {
                    const request = store.getAll();
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });

                log(`Found ${photos.length} photos`);

                const photosDiv = document.getElementById('photos');
                photosDiv.innerHTML = '';

                for (const photo of photos) {
                    const div = document.createElement('div');
                    div.className = 'photo';

                    const img = document.createElement('img');
                    img.src = URL.createObjectURL(photo.blob);

                    const info = document.createElement('div');
                    info.innerHTML = `
                        <small>
                            ID: ${photo.id}<br>
                            Uploaded: ${photo.uploaded ? '✅' : '❌'}<br>
                            Heading: ${photo.location.heading?.toFixed(0)}°<br>
                            Mode: ${photo.mode}
                        </small>
                    `;

                    div.appendChild(img);
                    div.appendChild(info);
                    photosDiv.appendChild(div);
                }
            } catch (error) {
                log('❌ Error: ' + error);
            }
        }

        window.clearPhotos = async function() {
            if (!confirm('Clear all photos?')) return;

            try {
                const db = await openDB();
                const transaction = db.transaction(['photos'], 'readwrite');
                const store = transaction.objectStore('photos');

                await new Promise((resolve, reject) => {
                    const request = store.clear();
                    request.onsuccess = resolve;
                    request.onerror = () => reject(request.error);
                });

                log('✅ All photos cleared');
                document.getElementById('photos').innerHTML = '';
            } catch (error) {
                log('❌ Error: ' + error);
            }
        }

        // Test on load
        testStorage();
    </script>
</body>
</html>
