# Development overrides — use with: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
# Uses host networking so ufw controls LAN access (Docker-published ports bypass ufw)

services:

  api:
    network_mode: host
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@localhost:${POSTGRES_HOST_PORT:-25432}/${POSTGRES_DB}
    volumes:
      - ./backend/api/app:/app/app
      - ./backend/common:/app/common

  umami:
    network_mode: host
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@localhost:${POSTGRES_HOST_PORT:-25432}/umami

  frontend:
    network_mode: host

  worker:
    init: true
    restart: always
    build:
      context: backend
      dockerfile: worker/Dockerfile
      args:
        MAGICK_MEMORY_LIMIT: ${MAGICK_MEMORY_LIMIT:-2GiB}
        MAGICK_MAP_LIMIT: ${MAGICK_MAP_LIMIT:-4GiB}
        MAGICK_DISK_LIMIT: ${MAGICK_DISK_LIMIT:-8GiB}
        MAGICK_WIDTH_LIMIT: ${MAGICK_WIDTH_LIMIT:-65536}
        MAGICK_HEIGHT_LIMIT: ${MAGICK_HEIGHT_LIMIT:-65536}
        MAGICK_AREA_LIMIT: ${MAGICK_AREA_LIMIT:-1GP}
    container_name: hillview_worker
    network_mode: host
    volumes:
      - ./backend/worker:/app/worker
      - ./backend/common:/app/common
      - uploads:/app/uploads
    environment:
      #- MAGICK_TEMPORARY_PATH=/app/worker/tmp/
      - UPLOAD_DIR=/app/uploads
      - PICS_URL=${PICS_URL:-}
      - WORKER_PORT=${WORKER_PORT:-8056}
      - WORKER_HOST=0.0.0.0 # not used
      - API_URL=${API_URL:-http://localhost:8055/api}
      - DEV_MODE=${DEV_MODE:-}
      - BUCKET_NAME=${BUCKET_NAME:-}
      - CDN_BASE_URL=${CDN_BASE_URL:-}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_ENDPOINT_URL_S3=${AWS_ENDPOINT_URL_S3:-}
      # OpenCV's EXR codec is disabled by default in opencv-python-headless
      # (CVE-2022-34526 history). Set OPENCV_IO_ENABLE_OPENEXR=1 to allow
      # cv2.imread to open .exr inputs. pyvips handles panorama EXRs on
      # the happy path; this flag only matters for the cv2 fallback branch
      # in read_image(). Default off.
      - OPENCV_IO_ENABLE_OPENEXR=${OPENCV_IO_ENABLE_OPENEXR:-0}
